name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer + TypeScript
        run: npm install --no-save puppeteer@22 typescript@5

      - name: Type check (tsc --checkJs)
        run: npx tsc --noEmit -p horarios-tiendas/tsconfig.json

      - name: Run tests
        run: node horarios-tiendas/tests/run-headless.js
