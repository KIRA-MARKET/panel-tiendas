<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facturas - Seleccionar Empresa</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
}

.container {
  text-align: center;
}

.icon {
  font-size: 60px;
  margin-bottom: 20px;
}

h1 {
  color: #fff;
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
}

.subtitle {
  color: rgba(255,255,255,0.8);
  font-size: 14px;
  margin-bottom: 40px;
}

.empresas {
  display: flex;
  gap: 24px;
}

.empresa-card {
  background: #fff;
  border-radius: 20px;
  padding: 40px 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-decoration: none;
  color: inherit;
}

.empresa-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 15px 40px rgba(0,0,0,0.3);
}

.empresa-card.kira {
  border-top: 6px solid #1a3c8f;
}

.empresa-card.reypik {
  border-top: 6px solid #2e7d32;
}

.empresa-logo {
  font-size: 36px;
  margin-bottom: 16px;
}

.empresa-name {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 4px;
}

.empresa-card.kira .empresa-name { color: #1a3c8f; }
.empresa-card.reypik .empresa-name { color: #2e7d32; }

.empresa-cif {
  font-size: 12px;
  color: #888;
}

.empresa-ubicacion {
  font-size: 11px;
  color: #aaa;
  margin-top: 8px;
}

.back-link {
  margin-top: 40px;
  color: rgba(255,255,255,0.8);
  text-decoration: none;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.back-link:hover {
  color: #fff;
}
</style>
</head>
<body>

<div class="container">
  <div class="icon">🧾</div>
  <h1>Gestión de Facturas</h1>
  <p class="subtitle">Selecciona la empresa</p>
  
  <div class="empresas">
    <a class="empresa-card kira" href="javascript:ejecutarFacturas('kira')">
      <div class="empresa-logo">🏪</div>
      <div class="empresa-name">KIRA MARKET S.L.</div>
      <div class="empresa-cif">CIF: BXXXXXXXX</div>
      <div class="empresa-ubicacion">Gran Vía de Colón</div>
    </a>
    
    <a class="empresa-card reypik" href="javascript:ejecutarFacturas('reypik')">
      <div class="empresa-logo">🏬</div>
      <div class="empresa-name">REYPIK MARKET S.L.</div>
      <div class="empresa-cif">CIF: BXXXXXXXX</div>
      <div class="empresa-ubicacion">Plaza Isabel la Católica</div>
    </a>
  </div>
  
  <a class="back-link" href="launcher.html">← Volver al panel</a>
</div>

<script>
function ejecutarFacturas(empresa) {
  // Esto ejecutará el script correspondiente
  // En Mac, usaremos un esquema URL personalizado o un archivo .command
  
  var scriptName = empresa === 'kira' 
    ? 'GESTION FACTURAS KIRA MARKET' 
    : 'GESTION FACTURAS REYPIK MARKET';
  
  // Opción 1: Abrir archivo .command (si existe)
  // window.location.href = 'file:///Users/nacho/Desktop/COSAS PARA COWORK/' + scriptName + '.command';
  
  // Opción 2: Mostrar instrucciones (temporal hasta configurar)
  alert('Ejecutar: ' + scriptName + '\n\nPara automatizar esto, necesitamos crear un archivo .command o configurar un esquema URL personalizado.\n\nPor ahora, abre Terminal y ejecuta el script manualmente.');
}
</script>

</body>
</html>
