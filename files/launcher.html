<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Gestión</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
}

.header {
  text-align: center;
  margin-bottom: 50px;
}

.header h1 {
  color: #fff;
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 8px;
}

.header p {
  color: rgba(255,255,255,0.6);
  font-size: 14px;
}

.apps-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
  max-width: 700px;
}

.app-card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 24px;
  padding: 40px 30px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s ease;
  border: 1px solid rgba(255,255,255,0.1);
  text-decoration: none;
}

.app-card:hover {
  transform: translateY(-8px);
  background: rgba(255,255,255,0.15);
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  border-color: rgba(255,255,255,0.2);
}

.app-icon {
  width: 80px;
  height: 80px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  margin: 0 auto 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.app-icon.horarios {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

.app-icon.facturas {
  background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
}

.app-icon.nominas {
  background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
}

.app-name {
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 6px;
}

.app-desc {
  color: rgba(255,255,255,0.5);
  font-size: 12px;
}

.footer {
  margin-top: 50px;
  color: rgba(255,255,255,0.3);
  font-size: 11px;
}
</style>
</head>
<body>

<div class="header">
  <h1>Panel de Gestión</h1>
  <p>Kira Market · Reypik Market</p>
</div>

<div class="apps-grid">
  <a class="app-card" href="app_horarios_v8.html">
    <div class="app-icon horarios">📅</div>
    <div class="app-name">Horarios</div>
    <div class="app-desc">Gestión de turnos</div>
  </a>
  
  <a class="app-card" href="selector_facturas.html">
    <div class="app-icon facturas">🧾</div>
    <div class="app-name">Facturas</div>
    <div class="app-desc">Búsqueda y archivo</div>
  </a>
  
  <a class="app-card" href="selector_nominas.html">
    <div class="app-icon nominas">📄</div>
    <div class="app-name">Nóminas</div>
    <div class="app-desc">Firma y envío</div>
  </a>
</div>

<div class="footer">
  v1.0 · 2026
</div>

</body>
</html>
